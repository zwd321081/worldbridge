<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WordBridge Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="settings-shell">
      <section class="hero">
        <h1 class="brand-title">
          <span>WordBridge</span>
        </h1>
        <p data-i18n="heroDesc">架起通往世界语言的桥。</p>
      </section>

      <form id="settings-form" class="settings-form">
        <label>
          <span class="label-with-badge">
            <span data-i18n="uiLanguage">界面语言</span>
            <span class="language-badge" aria-label="Languages">
              <span aria-hidden="true">文A</span>
              <span>Languages</span>
            </span>
          </span>
          <select id="uiLanguage" name="uiLanguage">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="it">Italiano</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="vi">Tiếng Việt</option>
            <option value="th">ไทย</option>
          </select>
        </label>
        <div class="switch-row">
          <label class="switch-label">
            <input id="enabled" name="enabled" type="checkbox">
            <span data-i18n="extensionEnabled">启用选词翻译</span>
          </label>
        </div>

        <div class="trigger-grid grid">
          <label>
            <span data-i18n="triggerModifier">修饰键</span>
            <select id="triggerModifier" name="triggerModifier">
              <option value="alt" data-i18n="modifierAlt">Alt / Option (⌥)</option>
              <option value="ctrl" data-i18n="modifierCtrl">Ctrl / Command (⌘)</option>
              <option value="shift" data-i18n="modifierShift">Shift</option>
              <option value="ctrl-shift" data-i18n="modifierCtrlShift">Ctrl / Command (⌘) + Shift</option>
              <option value="alt-shift" data-i18n="modifierAltShift">Alt / Option (⌥) + Shift</option>
            </select>
          </label>

          <label>
            <span data-i18n="triggerMode">触发方式</span>
            <select id="triggerMode" name="triggerMode">
              <option value="selection" data-i18n="triggerSelection">选中后自动翻译</option>
              <option value="modifier-selection" data-i18n="triggerModifierSelection">按住修饰键选中</option>
              <option value="modifier-double-click" data-i18n="triggerModifierDoubleClick">按住修饰键双击</option>
            </select>
          </label>
        </div>

        <label>
          <span data-i18n="apiBaseUrl">API Base URL</span>
          <input id="baseUrl" name="baseUrl" type="url" placeholder="https://api.openai.com/v1" required>
        </label>

        <label>
          <span data-i18n="apiKey">API Key</span>
          <input id="apiKey" name="apiKey" type="password" placeholder="sk-..." autocomplete="off">
        </label>

        <label>
          <span data-i18n="chatModel">聊天模型</span>
          <input id="model" name="model" type="text" placeholder="gpt-4o-mini" required>
        </label>

        <div class="language-grid grid">
          <label>
            <span data-i18n="sourceLanguage">源语言</span>
            <select id="sourceLanguage" name="sourceLanguage">
              <option value="Auto detect" data-i18n="autoDetect">自动识别</option>
              <option value="English">English</option>
              <option value="Chinese Simplified">简体中文</option>
              <option value="Chinese Traditional">繁体中文</option>
              <option value="Japanese">日本語</option>
              <option value="Korean">한국어</option>
              <option value="French">Français</option>
              <option value="German">Deutsch</option>
              <option value="Spanish">Español</option>
              <option value="Portuguese">Português</option>
              <option value="Italian">Italiano</option>
              <option value="Russian">Русский</option>
              <option value="Arabic">العربية</option>
              <option value="Hindi">हिन्दी</option>
              <option value="Vietnamese">Tiếng Việt</option>
              <option value="Thai">ไทย</option>
              <option value="Indonesian">Bahasa Indonesia</option>
              <option value="Malay">Bahasa Melayu</option>
              <option value="Turkish">Türkçe</option>
              <option value="Dutch">Nederlands</option>
              <option value="Swedish">Svenska</option>
              <option value="Polish">Polski</option>
            </select>
          </label>

          <label>
            <span data-i18n="targetLanguage">目标语言</span>
            <select id="targetLanguage" name="targetLanguage">
              <option value="English">English</option>
              <option value="Chinese Simplified">简体中文</option>
              <option value="Chinese Traditional">繁体中文</option>
              <option value="Japanese">日本語</option>
              <option value="Korean">한국어</option>
              <option value="French">Français</option>
              <option value="German">Deutsch</option>
              <option value="Spanish">Español</option>
              <option value="Portuguese">Português</option>
              <option value="Italian">Italiano</option>
              <option value="Russian">Русский</option>
              <option value="Arabic">العربية</option>
              <option value="Hindi">हिन्दी</option>
              <option value="Vietnamese">Tiếng Việt</option>
              <option value="Thai">ไทย</option>
              <option value="Indonesian">Bahasa Indonesia</option>
              <option value="Malay">Bahasa Melayu</option>
              <option value="Turkish">Türkçe</option>
              <option value="Dutch">Nederlands</option>
              <option value="Swedish">Svenska</option>
              <option value="Polish">Polski</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button type="submit" data-i18n="saveSettings">保存设置</button>
          <button id="test-button" class="secondary" type="button" data-i18n="testTranslation">测试翻译</button>
        </div>

        <p id="status" class="status" role="status"></p>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
